name: Auto Version Bump & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-and-release:
    if: "!contains(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: node .github/scripts/bump-version.mjs

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/module.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build distribution
        run: npm run build

      - name: Package module
        run: |
          mkdir package
          mv -v ./dist/* ./package/
          (cd package && zip -r "$OLDPWD/module.zip" .)

      - name: Tag and create release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes \
            ./src/module.json ./module.zip
