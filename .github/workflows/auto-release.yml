name: Auto Version Bump & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-and-release:
    if: "!contains(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: bump
        run: node .github/scripts/bump-version.mjs

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src/module.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push

      - name: Tag and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes
